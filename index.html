<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabOS - Simple Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-flask"></i> LabOS
        </div>
        <ul class="nav-links">
            <li class="nav-item active" data-page="overview"><i class="fas fa-home"></i> Overview</li>
            <li class="nav-item" data-page="devices"><i class="fas fa-microchip"></i> Devices</li>
            <li class="nav-item" data-page="safety"><i class="fas fa-shield-alt"></i> Safety</li>
            <li class="nav-item" data-page="settings"><i class="fas fa-cog"></i> Settings</li>
        </ul>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="page-title">Overview</h1>
            <div class="status-dots">
                <div class="dot">MQTT: Connected</div>
                <div class="dot">System: Online</div>
            </div>
        </div>

        <div class="content">
            <!-- Overview -->
            <div id="page-overview" class="page active">
                <div class="grid">
                    <div class="card">
                        <div class="card-title">Temperature</div>
                        <div class="card-value">24.5<span>°C</span></div>
                    </div>
                    <div class="card">
                        <div class="card-title">Humidity</div>
                        <div class="card-value">48<span>%</span></div>
                    </div>
                    <div class="card">
                        <div class="card-title">Power Usage</div>
                        <div class="card-value">1.2<span>kW</span></div>
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <h3>Laboratory Controls</h3>
                    <div class="grid" style="margin-top: 15px;">
                        <div class="card">
                            <div class="card-title">Main Lights</div>
                            <div class="switch-container">
                                <span>Status</span>
                                <div class="switch on" onclick="this.classList.toggle('on')"></div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-title">Exhaust Fan</div>
                            <div class="switch-container">
                                <span>Status</span>
                                <div class="switch" onclick="this.classList.toggle('on')"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Safety -->
            <div id="page-safety" class="page">
                <div class="card" style="border-left: 4px solid var(--danger);">
                    <h3>Emergency Shutdown</h3>
                    <p style="color: var(--text-dim); margin-top: 10px; font-size: 14px;">Pressing this will cut power to all lab equipment immediately.</p>
                    <button style="margin-top: 20px; padding: 12px 24px; background: var(--danger); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600;">INITIATE SHUTDOWN</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
